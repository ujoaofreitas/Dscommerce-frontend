<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSCommerce | Login</title>
    <link rel="stylesheet" href="./css/login.css">

  </head>
  <body>
    <header>
      <nav class="dsc-container">
        <a href="./index.html">
          <h1>DSCommerce</h1>
        </a>
        <a href="#" id="entrar">Sign in</a>
      </nav>
    </header>
    <main>
      <section id="login-section" class="dsc-container">
          <div class="dsc-login-form-container">
            <form class="dsc-card dsc-form">
              <h2>Login</h2>
              <div class="dsc-form-controls-container">
                <div>
                  <input class="dsc-form-control dsc-input-error" type="text" placeholder="Email">
                  <div class="dsc-form-error">Campo obrigatório</div>
                </div>
                <div>
                  <input class="dsc-form-control" type="password" placeholder="Password">
                </div>
                
                <div class="dsc-login-form-buttons dsc-mt20">
                  <button type="submit" class="dsc-btn dsc-btn-orange">Login</button>
                </div>
              </div>


            </form>
          </div>
      </section>
    </main>
  </body>
</html>
